<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历模版编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --app-bg: #f2f4f8;
            --panel-bg: rgba(255, 255, 255, 0.86);
            --panel-border: rgba(15, 23, 42, 0.08);
            --paper-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
            --resume-accent: #c53b3b;
            --resume-ink: #202124;
            --resume-muted: #666;
            --resume-grid: rgba(197, 59, 59, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(197, 59, 59, 0.08), transparent 18%),
                radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.06), transparent 18%),
                linear-gradient(180deg, #f8fafc 0%, var(--app-bg) 100%);
            color: #0f172a;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #475569;
        }

        .field-input,
        .field-textarea,
        .field-select {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(255, 255, 255, 0.92);
            color: #0f172a;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .field-input:focus,
        .field-textarea:focus,
        .field-select:focus {
            border-color: rgba(197, 59, 59, 0.58);
            box-shadow: 0 0 0 4px rgba(197, 59, 59, 0.09);
        }

        .field-textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.55;
        }

        .field-textarea--medium {
            min-height: 210px;
        }

        .field-textarea--large {
            min-height: 360px;
        }

        .field-range {
            width: 100%;
            accent-color: var(--resume-accent);
        }

        .action-btn {
            border-radius: 999px;
            padding: 10px 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: white;
            color: #0f172a;
            font-size: 13px;
            font-weight: 700;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #c53b3b 0%, #d95959 100%);
            color: white;
            border-color: rgba(197, 59, 59, 0.9);
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(197, 59, 59, 0.08);
            color: #8f2c2c;
            font-size: 12px;
            font-weight: 700;
        }

        .resume-stage {
            position: sticky;
            top: 24px;
            width: fit-content;
        }

        .resume-paper {
            position: relative;
            width: 210mm;
            height: 297mm;
            padding: 6mm 6.5mm 7mm;
            background: white;
            box-shadow: var(--paper-shadow);
            border: 1px solid rgba(15, 23, 42, 0.08);
            color: var(--resume-ink);
            overflow: hidden;
            break-inside: avoid-page;
            page-break-inside: avoid;
        }

        .print-clone-host {
            display: none;
        }

        .resume-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .format-btn {
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: #334155;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 14px;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .format-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
        }

        .resume-editable {
            border-radius: 4px;
            transition: background-color 0.16s ease, box-shadow 0.16s ease;
        }

        .resume-editable:hover {
            background: rgba(197, 59, 59, 0.04);
        }

        .resume-editable:focus {
            outline: none;
            background: rgba(197, 59, 59, 0.06);
            box-shadow: 0 0 0 2px rgba(197, 59, 59, 0.18);
        }

        .resume-paper::before,
        .resume-paper::after {
            content: "";
            position: absolute;
            border: 1px solid rgba(148, 163, 184, 0.14);
            width: 190px;
            height: 190px;
            transform: rotate(45deg);
            pointer-events: none;
        }

        .resume-paper::before {
            top: -96px;
            right: 58px;
        }

        .resume-paper::after {
            top: -74px;
            right: 148px;
        }

        .resume-name {
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: 0.02em;
        }

        .resume-header-line,
        .resume-meta-line {
            text-align: center;
        }

        .resume-section {
            margin-top: 12px;
        }

        .resume-section-title {
            display: block;
            color: var(--resume-accent);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .resume-rule {
            height: 1px;
            background: rgba(197, 59, 59, 0.55);
            margin-bottom: 5px;
        }

        .resume-edu-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .resume-edu-table td {
            padding: 1px 4px 1px 0;
            vertical-align: top;
            line-height: 1.35;
            word-break: break-word;
        }

        .resume-edu-table td.edu-compact {
            white-space: nowrap;
            word-break: keep-all;
        }

        .resume-edu-table td.edu-wide {
            padding-top: 4px;
            white-space: normal;
            word-break: break-word;
        }

        .resume-entry + .resume-entry {
            margin-top: 6px;
        }

        .resume-entry-paragraph {
            line-height: inherit;
        }

        .resume-entry-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            font-weight: 700;
            line-height: inherit;
        }

        .resume-entry-sub {
            color: #111827;
        }

        .resume-entry-date {
            flex-shrink: 0;
            white-space: nowrap;
            text-align: right;
        }

        .resume-entry ul {
            margin: 3px 0 0;
            padding-left: 0;
            list-style: none;
        }

        .resume-entry li {
            position: relative;
            margin: 1px 0;
            padding-left: 14px;
            line-height: inherit;
        }

        .resume-entry li::before {
            content: "•";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--resume-ink);
            font-weight: 700;
        }

        .resume-entry li.justify {
            text-align: justify;
            text-justify: inter-ideograph;
        }

        .resume-photo {
            width: 82px;
            height: 108px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            object-fit: cover;
            background:
                linear-gradient(180deg, rgba(248, 250, 252, 0.8), rgba(226, 232, 240, 0.86));
        }

        .photo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
        }

        .muted-note {
            font-size: 12px;
            color: #64748b;
            line-height: 1.6;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(520px, 580px);
            gap: 24px;
        }

        .control-card {
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(255, 255, 255, 0.55);
            padding: 16px;
        }

        .control-card + .control-card {
            margin-top: 14px;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.05);
            color: #334155;
        }

        .status-pill.is-success {
            background: rgba(16, 185, 129, 0.12);
            color: #047857;
        }

        .status-pill.is-warning {
            background: rgba(245, 158, 11, 0.14);
            color: #b45309;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: min(100%, 520px);
        }

        .top-controls-panel.is-collapsed {
            padding-top: 16px;
            padding-bottom: 16px;
        }

        .top-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .top-panel-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .top-collapse-btn {
            flex-shrink: 0;
        }

        .top-identity {
            flex: 1;
            min-width: 0;
            max-width: 560px;
        }

        .top-utility-card {
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.62);
            padding: 16px;
        }

        .top-utility-card .subheading {
            margin-bottom: 12px;
        }

        .top-layout-bar {
            margin-top: 16px;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.62);
            padding: 16px;
        }

        .top-layout-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px 16px;
            align-items: end;
        }

        .top-layout-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 100%;
            padding-top: 24px;
        }

        .section-typography-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px 14px;
        }

        .editor-sidebar {
            position: sticky;
            top: 24px;
            align-self: start;
            max-height: calc(100vh - 48px);
            overflow: auto;
        }

        .editor-sidebar::-webkit-scrollbar {
            width: 10px;
        }

        .editor-sidebar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.32);
            border-radius: 999px;
        }

        .panel-switcher {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .panel-switcher-btn {
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.7);
            color: #475569;
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            transition: background-color 0.16s ease, color 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
        }

        .panel-switcher-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.92);
        }

        .panel-switcher-btn.is-active {
            background: rgba(197, 59, 59, 0.1);
            color: #8f2c2c;
            border-color: rgba(197, 59, 59, 0.32);
        }

        .editor-panel {
            display: none;
        }

        .editor-panel.is-active {
            display: block;
        }

        .subheading {
            margin: 0 0 10px;
            font-size: 15px;
            font-weight: 800;
            color: #1e293b;
        }

        @media (max-width: 1400px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }

            .resume-stage {
                position: static;
                overflow: auto;
            }

            .editor-sidebar {
                position: static;
            }

            .top-layout-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .panel-switcher {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .section-typography-grid {
                grid-template-columns: 1fr;
            }

            .top-panel-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .top-layout-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .top-layout-toggle {
                padding-top: 0;
            }
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: white;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .editor-only {
                display: none !important;
            }

            .editor-grid,
            .resume-stage {
                display: block;
                margin: 0;
                padding: 0;
            }

            .resume-paper {
                box-shadow: none;
                border: none;
                margin: 0;
                width: 210mm;
                height: 297mm;
                min-height: 297mm;
                max-height: 297mm;
                overflow: hidden;
            }

            body.print-mode main {
                display: none !important;
            }

            body.print-mode .print-clone-host {
                display: block !important;
            }

            body.print-mode .print-clone-host .resume-paper {
                box-shadow: none;
                border: none;
                margin: 0;
                width: 210mm;
                height: 297mm;
                min-height: 297mm;
                max-height: 297mm;
                overflow: hidden;
            }

            body.print-mode .print-clone-host .resume-editable {
                background: transparent !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>
    <main class="max-w-[1600px] mx-auto px-4 py-6 md:px-6 md:py-8">
        <section id="topControlsSection" class="glass-panel rounded-[32px] p-5 md:p-6 editor-only top-controls-panel">
            <div class="top-panel-header">
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">二进制思考</h1>
                <button id="topCollapseBtn" class="action-btn top-collapse-btn" type="button" aria-expanded="true">收起顶部</button>
            </div>
            <div id="topControlsBody" class="top-panel-body">
                <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                    <div class="top-identity">
                        <div class="top-utility-card">
                            <h3 class="subheading">存储与预设</h3>
                            <div class="space-y-3">
                                <div>
                                    <label class="field-label" for="presetSelect">已保存预设</label>
                                    <select id="presetSelect" class="field-select">
                                        <option value="">选择一个预设</option>
                                    </select>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    <button id="savePresetBtn" class="action-btn">保存为预设</button>
                                    <button id="deletePresetBtn" class="action-btn">删除预设</button>
                                </div>
                                <input id="importJsonInput" type="file" accept="application/json" class="hidden">
                                <p class="muted-note">保存预设时会弹窗输入名称，选择下拉项后会自动加载对应内容。</p>
                            </div>
                        </div>
                    </div>
                    <div class="hero-actions">
                        <div class="status-row">
                            <span id="draftStateBadge" class="status-pill is-success">自动保存已开启</span>
                            <span id="presetCountBadge" class="status-pill">0 个预设</span>
                        </div>
                        <p id="storageStatus" class="muted-note">改右侧内容，左侧简历会实时刷新。</p>
                        <p id="activePresetStatus" class="muted-note">当前未选择预设。</p>
                        <div class="flex flex-wrap gap-2">
                            <button id="saveBtn" class="action-btn">保存草稿</button>
                            <button id="printBtn" class="action-btn primary">打印 / 导出 PDF</button>
                            <button id="exportJsonBtn" class="action-btn">导出 JSON</button>
                            <button id="importJsonBtn" class="action-btn">导入 JSON</button>
                            <button id="resetBtn" class="action-btn">恢复默认</button>
                        </div>
                    </div>
                </div>
                <div class="top-layout-bar">
                    <h3 class="subheading">全局排版</h3>
                    <div class="top-layout-grid">
                        <div>
                            <label class="field-label" for="nameSize">姓名字号</label>
                            <input id="nameSize" class="field-range" type="range" min="24" max="40" step="1" value="31">
                        </div>
                        <div>
                            <label class="field-label" for="metaSize">基本信息字号</label>
                            <input id="metaSize" class="field-range" type="range" min="10" max="18" step="1" value="12">
                        </div>
                        <div>
                            <label class="field-label" for="sectionGap">分区间距</label>
                            <input id="sectionGap" class="field-range" type="range" min="8" max="22" step="1" value="12">
                        </div>
                        <div>
                            <label class="field-label" for="topSectionGap">顶部到教育背景间距</label>
                            <input id="topSectionGap" class="field-range" type="range" min="6" max="28" step="1" value="12">
                        </div>
                        <div class="top-layout-toggle">
                            <input id="justifyToggle" type="checkbox" checked>
                            <label for="justifyToggle" class="text-sm font-semibold text-slate-700">正文两端对齐</label>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="editor-grid mt-6">
            <div class="resume-stage">
                <div class="resume-toolbar editor-only">
                    <button class="format-btn" data-command="bold">加粗</button>
                    <button class="format-btn" data-command="insertUnorderedList">项目符号</button>
                    <button class="format-btn" data-command="removeFormat">清除格式</button>
                    <span class="muted-note">点击纸面文字可直接改，选中文字后点按钮即可套格式。</span>
                </div>
                <div class="resume-paper" id="resumePaper">
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="resume-header-line">
                                <div id="previewName" class="resume-name resume-editable" contenteditable="true" data-bind-input="nameInput" data-rich-key="name"></div>
                            </div>
                            <div id="previewContact1" class="resume-meta-line mt-1 resume-editable" contenteditable="true" data-bind-input="contactLine1Input" data-rich-key="contactLine1"></div>
                            <div id="previewContact2" class="resume-meta-line mt-[2px] resume-editable" contenteditable="true" data-bind-input="contactLine2Input" data-rich-key="contactLine2"></div>
                            <div id="previewSummary" class="resume-meta-line mt-[3px] resume-editable" contenteditable="true" data-bind-input="summaryInput" data-rich-key="summary"></div>
                        </div>
                        <div class="flex-shrink-0">
                            <img id="previewPhoto" class="resume-photo hidden" alt="简历照片">
                            <div id="previewPhotoPlaceholder" class="resume-photo photo-placeholder">证件照</div>
                        </div>
                    </div>

                    <div id="resumeSections"></div>
                </div>
            </div>

            <aside class="glass-panel rounded-[32px] p-5 md:p-6 editor-only editor-sidebar">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900">编辑面板</h2>
                        <p class="muted-note mt-1">顶部固定放常用工具，这里专注切换和编辑具体内容，长内容字段已加大，适合连续改实习和项目经历。</p>
                    </div>
                </div>

                <div class="control-card mt-4">
                    <h3 class="subheading">内容切换</h3>
                    <div class="panel-switcher">
                        <button class="panel-switcher-btn is-active" data-panel-target="profile">顶部</button>
                        <div id="dynamicPanelTabs" class="contents"></div>
                    </div>
                    <div class="mt-3">
                        <button id="addSectionBtn" class="action-btn">新增部分</button>
                    </div>
                </div>

                <div class="control-card editor-panel is-active" data-editor-panel="profile">
                    <h3 class="subheading">顶部信息</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="field-label" for="nameInput">姓名</label>
                            <input id="nameInput" class="field-input" type="text">
                        </div>
                        <div>
                            <label class="field-label" for="contactLine1Input">联系人 / 邮箱</label>
                            <input id="contactLine1Input" class="field-input" type="text">
                        </div>
                        <div>
                            <label class="field-label" for="contactLine2Input">年龄 / 城市等</label>
                            <input id="contactLine2Input" class="field-input" type="text">
                        </div>
                        <div>
                            <label class="field-label" for="summaryInput">求职意向摘要</label>
                            <input id="summaryInput" class="field-input" type="text">
                        </div>
                        <div>
                            <label class="field-label" for="photoInput">证件照</label>
                            <input id="photoInput" class="field-input" type="file" accept="image/*">
                        </div>
                    </div>
                </div>
                <div id="dynamicSectionPanels"></div>
            </aside>
        </section>
    </main>
    <div id="printCloneHost" class="print-clone-host" aria-hidden="true"></div>

    <script>
        const STORAGE_KEY = 'resume-template-editor-storage-v2';
        const STORAGE_BACKUP_KEY = 'resume-template-editor-storage-v2-backup';
        const LEGACY_STORAGE_KEY = 'resume-template-editor-state-v1';
        const UI_PANEL_KEY = 'resume-template-editor-ui-panel-v1';
        const TOP_PANEL_KEY = 'resume-template-editor-top-panel-v1';
        const STORAGE_VERSION = 2;
        const DEFAULT_PRESET_NAME = '二进制思考默认模版';
        const DEFAULT_SECTION_TITLE_SIZE = 16;
        const DEFAULT_SECTION_TITLE_LINE_HEIGHT = 1.15;
        const DEFAULT_SECTION_BODY_SIZE = 13;

        function parseLineBlocks(text) {
            return String(text || '')
                .trim()
                .split(/\n\s*\n/)
                .map((block) => block.split('\n').map((line) => line.trim()).filter(Boolean))
                .filter((block) => block.length);
        }

        function parseEducation(text) {
            return String(text || '')
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean)
                .map((line) => {
                    const cols = line.split('|').map((part) => part.trim());
                    while (cols.length < 6) cols.push('');
                    return cols.slice(0, 6);
                });
        }

        function parseEntries(text) {
            return parseLineBlocks(text).map((block) => {
                const [headerLine = '', ...bulletLines] = block;
                const hasHeaderMeta = headerLine.includes('|');
                const isParagraphOnly = !hasHeaderMeta && block.length === 1;
                if (isParagraphOnly) {
                    return {
                        type: 'paragraph',
                        paragraph: headerLine.trim(),
                        title: '',
                        subtitle: '',
                        date: '',
                        bullets: []
                    };
                }
                const header = headerLine.split('|').map((part) => part.trim());
                return {
                    type: 'structured',
                    title: header[0] || '',
                    subtitle: header[1] || '',
                    date: header[2] || '',
                    bullets: bulletLines.filter(Boolean)
                };
            });
        }

                .split('\n')
                .map((line) => line.trim())

        function applyLegacyBulletText(li, nextText) {
            const normalizedText = String(nextText || '').trim();
            const existingSpan = li.querySelector('span') || document.createElement('span');
            if (!existingSpan.style.fontWeight) {
                existingSpan.style.fontWeight = 'normal';
            }

            const delimiterMatch = normalizedText.match(/[:：]/);
            const delimiterIndex = delimiterMatch ? normalizedText.indexOf(delimiterMatch[0]) : -1;
            const labelText = delimiterIndex >= 0 ? normalizedText.slice(0, delimiterIndex + 1).trim() : '';
            const bodyText = delimiterIndex >= 0 ? normalizedText.slice(delimiterIndex + 1).trim() : normalizedText;

            li.innerHTML = '';
            if (labelText) {
                li.appendChild(document.createTextNode(labelText));
                if (bodyText) {
                    li.appendChild(document.createTextNode(' '));
                }
            }
            existingSpan.textContent = bodyText;
            li.appendChild(existingSpan);
        }

        function updateLegacyEntriesHtml(html, text) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html || '';
            const lines = String(text || '')
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean);

            const entries = Array.from(wrapper.querySelectorAll('.resume-entry'));
            entries.forEach((entry, index) => {
                const line = lines[index];
                if (!line) return;
                const nextText = stripLegacyPlaceholder(line);
                const bulletNodes = Array.from(entry.querySelectorAll('li'));
                if (bulletNodes.length === 1) {
                    applyLegacyBulletText(bulletNodes[0], nextText);
                    return;
                }
                const titleNode = entry.querySelector('[data-role="entry-title"]') || entry.querySelector('.resume-editable');
                if (titleNode) {
                    titleNode.textContent = nextText;
                }
            });

            return wrapper.innerHTML;

        function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(reader.error || new Error('read-failed'));
                reader.readAsDataURL(file);
            });
        }

        function loadImageElement(dataUrl) {
            return new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error('image-load-failed'));
                image.src = dataUrl;
            });
        }

        async function optimizePhotoFile(file) {
            const originalDataUrl = await readFileAsDataUrl(file);
            if (!String(file.type || '').startsWith('image/')) {
                return originalDataUrl;
            }

            try {
                const image = await loadImageElement(originalDataUrl);
                const sourceWidth = image.naturalWidth || image.width || PHOTO_TARGET_WIDTH;
                const sourceHeight = image.naturalHeight || image.height || PHOTO_TARGET_HEIGHT;
                const scale = Math.min(1, PHOTO_TARGET_WIDTH / sourceWidth, PHOTO_TARGET_HEIGHT / sourceHeight);
                const width = Math.max(1, Math.round(sourceWidth * scale));
                const height = Math.max(1, Math.round(sourceHeight * scale));
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const context = canvas.getContext('2d');
                if (!context) return originalDataUrl;
                context.fillStyle = '#ffffff';
                context.fillRect(0, 0, width, height);
                context.imageSmoothingEnabled = true;
                context.imageSmoothingQuality = 'high';
                context.drawImage(image, 0, 0, width, height);
                return canvas.toDataURL('image/jpeg', PHOTO_JPEG_QUALITY);
            } catch (error) {
                return originalDataUrl;
            }
        }

                ? `当前预设：${activePreset}`
                : '当前未选择预设。';
        }

        function setDirty(nextDirty) {
            isDirty = nextDirty;
            updateDraftStateBadge();
            updateSaveButtonLabel();
        }

        function persistStorage() {
            const payload = JSON.stringify(storageData);
            try {
                localStorage.setItem(STORAGE_KEY, payload);
                localStorage.setItem(STORAGE_BACKUP_KEY, payload);
                return true;
            } catch (error) {
                console.error('persistStorage failed', error);
                return false;
            }
        }

        function migrateLegacyStorage(raw) {
            const next = createEmptyStorage();
            next.draft = raw;
            next.updatedAt = new Date().toISOString();
            return next;
        }

        function readStorageCandidate(key) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : null;
            } catch (error) {
                return null;
            }
        }

        function normalizeImportedStorage(raw) {
            if (!raw || typeof raw !== 'object') return null;

            if ('version' in raw && ('draft' in raw || 'presets' in raw)) {
                return {
                    version: STORAGE_VERSION,
                    updatedAt: raw.updatedAt || '',
                    activePreset: raw.activePreset || '',
                    draft: raw.draft || null,
                    presets: raw.presets && typeof raw.presets === 'object' ? raw.presets : {}
                };
            }

            if ('name' in raw || 'education' in raw || 'sections' in raw || 'richState' in raw) {
                return migrateLegacyStorage(raw);
            }

            return null;
        }

        function loadStorageData() {
            const primary = normalizeImportedStorage(readStorageCandidate(STORAGE_KEY));
            if (primary) return primary;

            const backup = normalizeImportedStorage(readStorageCandidate(STORAGE_BACKUP_KEY));
            if (backup) return backup;

            const legacy = normalizeImportedStorage(readStorageCandidate(LEGACY_STORAGE_KEY));
            if (legacy) {
                storageData = legacy;
                persistStorage();
                localStorage.removeItem(LEGACY_STORAGE_KEY);
                return storageData;
            }

            return createEmptyStorage();
        }

        function refreshPresetSelect() {
            const builtInNames = Object.keys(BUILT_IN_PRESETS).sort((a, b) => a.localeCompare(b, 'zh-CN'));
            const customNames = Object.keys(storageData.presets).sort((a, b) => a.localeCompare(b, 'zh-CN'));
            const selected = storageData.activePreset || '';
            els.presetSelect.innerHTML = '<option value="">选择一个预设</option>';

            if (builtInNames.length) {
                const builtInGroup = document.createElement('optgroup');
                builtInGroup.label = '内置模版';
                builtInNames.forEach((name) => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    if (name === selected) option.selected = true;
                    builtInGroup.appendChild(option);
                });
                els.presetSelect.appendChild(builtInGroup);
            }

            if (customNames.length) {
                const customGroup = document.createElement('optgroup');
                customGroup.label = '我的预设';
                customNames.forEach((name) => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    if (name === selected) option.selected = true;
                    customGroup.appendChild(option);
                });
                els.presetSelect.appendChild(customGroup);
            }

            updatePresetStatus();
        }

        function getSavePresetPromptDefault() {
            const currentName = storageData.activePreset || els.presetSelect.value || '';
            if (isBuiltInPreset(currentName)) {
                return `${currentName} 副本`;
            }
            return currentName;
        }

        function saveCurrentAsPreset() {
            const presetName = window.prompt('请输入预设名称', getSavePresetPromptDefault());
            const normalizedName = (presetName || '').trim();
            if (!normalizedName) {
                setStorageStatus('已取消保存预设。');
                return;
            }

            if (isBuiltInPreset(normalizedName)) {
                setStorageStatus(`“${normalizedName}”是内置模版名称，请换一个名字保存。`);
                return;
            }

            if (storageData.presets[normalizedName] && !window.confirm(`预设“${normalizedName}”已存在，是否覆盖？`)) {
                setStorageStatus('已取消覆盖已有预设。');
                return;
            }

            storageData.presets[normalizedName] = cloneValue(getSerializableState());
            storageData.activePreset = normalizedName;
            if (!persistStorage()) {
                refreshPresetSelect();
                setStorageStatus(`预设“${normalizedName}”暂未写入本地，可能是证件照过大。请重新上传图片后再保存一次。`);
                return;
            }
            refreshPresetSelect();
            saveDraft({ silent: true });
            setStorageStatus(`预设“${normalizedName}”已保存。`);
        }

        function loadSelectedPreset() {
            const presetName = els.presetSelect.value;
            const presetState = getPresetSnapshot(presetName);
            if (!presetName || !presetState) {
                setStorageStatus('先选择一个可用的预设。');
                return;
            }

            storageData.activePreset = presetName;
            applySavedState(presetState);
            persistStorage();
            refreshPresetSelect();
            saveDraft({ silent: true });
            setStorageStatus(`已载入预设“${presetName}”。`);
        }

        function deleteSelectedPreset() {
            const presetName = els.presetSelect.value;
            if (!presetName) {
                setStorageStatus('没有可删除的预设。');
                return;
            }

            if (isBuiltInPreset(presetName)) {
                setStorageStatus(`内置模版“${presetName}”不能删除。`);
                return;
            }

            if (!storageData.presets[presetName]) {
                setStorageStatus('没有可删除的预设。');
                return;
            }

            if (!window.confirm(`确认删除预设“${presetName}”？此操作不会影响当前草稿。`)) {
                setStorageStatus('已取消删除预设。');
                return;
            }

            delete storageData.presets[presetName];
            if (storageData.activePreset === presetName) {
                storageData.activePreset = DEFAULT_PRESET_NAME;
            }
            persistStorage();
            refreshPresetSelect();
            setStorageStatus(`预设“${presetName}”已删除。`);
        }

        function syncActivePresetDraft(nextState) {
            const activePreset = storageData.activePreset;
            if (!activePreset || isBuiltInPreset(activePreset)) {
                return false;
            }
            storageData.presets[activePreset] = cloneValue(nextState);
            return true;
        }

        function saveDraft({ silent = false } = {}) {
            storageData.version = STORAGE_VERSION;
            storageData.updatedAt = new Date().toISOString();
            const nextState = cloneValue(getSerializableState());
            storageData.draft = nextState;
            const syncedActivePreset = syncActivePresetDraft(nextState);
            if (!persistStorage()) {
                setDirty(true);
                if (!silent) {
                    updateSaveButtonLabel('保存失败');
                }
                setStorageStatus('本地保存失败，可能是证件照过大或预设过多。现在上传的照片会自动压缩，重新保存一次即可。');
                return false;
            }
            setDirty(false);
            if (!silent) {
                updateSaveButtonLabel('已保存');
                window.setTimeout(() => {
                    updateSaveButtonLabel();
                }, 1400);
            }
            setStorageStatus(
                syncedActivePreset
                    ? `草稿和当前预设已保存 ${formatTimeLabel()}`
                    : `草稿已保存到当前浏览器 ${formatTimeLabel()}`
            );
        }

        function scheduleAutosave() {
            if (suppressAutosave) return;
            setDirty(true);
            window.clearTimeout(autosaveTimer);
            autosaveTimer = window.setTimeout(() => {
                saveDraft({ silent: true });
            }, 320);
        }

        function loadInitialState() {
            storageData = loadStorageData();
            refreshPresetSelect();

            if (storageData.draft) {
                applySavedState(storageData.draft);
                setStorageStatus(`已恢复本地草稿 ${storageData.updatedAt ? formatTimeLabel(new Date(storageData.updatedAt)) : ''}`.trim());
                setDirty(false);
                return true;
            }

            setStorageStatus('已载入内置模版，可直接改成你自己的内容。');
            setDirty(false);
            return false;
        }

        function downloadJson(filename, payload) {
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = filename;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 0);
        }

        function exportStorageJson() {
            saveDraft({ silent: true });
            downloadJson(`resume-presets-${new Date().toISOString().slice(0, 10)}.json`, storageData);
            setStorageStatus('已导出 JSON，可在其他浏览器导入。');
        }

        function importStorageJson(event) {
            const file = event.target.files?.[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const parsed = JSON.parse(String(reader.result || '{}'));
                    const imported = normalizeImportedStorage(parsed);
                    if (!imported) throw new Error('invalid');
                    storageData = {
                        version: STORAGE_VERSION,
                        updatedAt: imported.updatedAt || new Date().toISOString(),
                        activePreset: imported.activePreset || storageData.activePreset || '',
                        draft: imported.draft || storageData.draft || null,
                        presets: {
                            ...storageData.presets,
                            ...imported.presets
                        }
                    };
                    persistStorage();
                    refreshPresetSelect();
                    if (storageData.draft) {
                        applySavedState(storageData.draft);
                    } else {
                        applyDefaults();
                    }
                    saveDraft({ silent: true });
                    setStorageStatus('已导入 JSON，当前草稿和预设都已恢复。');
                } catch (error) {
                    setStorageStatus('导入失败：文件不是可识别的简历预设 JSON。');
                } finally {
                    els.importJsonInput.value = '';
                }
            };
            reader.readAsText(file, 'utf-8');
        }

        function setEditableContent(el, value, richKey) {
            const richHtml = topRichState[richKey] || '';
            el.innerHTML = richHtml || value || '';
            el.style.display = value || richHtml ? '' : 'none';
        }

        function renderPhoto() {
            if (photoDataUrl) {
                els.previewPhoto.src = photoDataUrl;
                els.previewPhoto.classList.remove('hidden');
                els.previewPhotoPlaceholder.classList.add('hidden');
            } else {
                els.previewPhoto.classList.add('hidden');
                els.previewPhotoPlaceholder.classList.remove('hidden');
            }
        }

        function normalizeSectionBodyTypography(container, { bodySize, lineHeight, justify = false, kind = 'entries' }) {
            container.querySelectorAll('[style]').forEach((node) => {
                if (node.style.fontSize) node.style.fontSize = '';
                if (node.style.lineHeight) node.style.lineHeight = '';
                if (kind === 'entries' || kind === 'skills') {
                    if (node.style.textAlign) node.style.textAlign = '';
                    if (node.style.textJustify) node.style.textJustify = '';
                }
            });

            container.querySelectorAll('.resume-entry').forEach((node) => {
                node.style.fontSize = `${bodySize}px`;
                node.style.lineHeight = lineHeight;
            });

            if (kind === 'entries') {
                container.querySelectorAll('.resume-entry-header, .resume-entry-paragraph, .resume-entry li, .resume-entry-date, .resume-entry-sub, [data-role="entry-title"], [data-role="entry-subtitle"], [data-role="entry-date"], [data-role="entry-paragraph"], [data-role="entry-bullet"]').forEach((node) => {
                    node.style.lineHeight = lineHeight;
                });
                container.querySelectorAll('.resume-entry-paragraph').forEach((node) => {
                    if (justify) {
                        node.style.textAlign = 'justify';
                        node.style.textJustify = 'inter-ideograph';
                    } else {
                        node.style.textAlign = '';
                        node.style.textJustify = '';
                    }
                });
                container.querySelectorAll('li').forEach((li) => {
                    li.classList.toggle('justify', justify);
                });
            }

            if (kind === 'skills') {
                container.querySelectorAll('.resume-entry, [data-role="skill-label"], [data-role="skill-content"]').forEach((node) => {
                    node.style.lineHeight = lineHeight;
                });
                container.querySelectorAll('.resume-entry').forEach((wrapper) => {
                    if (justify) {
                        wrapper.style.textAlign = 'justify';
                        wrapper.style.textJustify = 'inter-ideograph';
                    } else {
                        wrapper.style.textAlign = '';
                        wrapper.style.textJustify = '';
                    }
                });
            }
        }

        function createEntriesNode(section, bodySize, lineHeight, justify) {
            const container = document.createElement('div');
            container.dataset.role = 'section-body';
            container.dataset.sectionKind = 'entries';

            if (section.contentHtml) {
                container.innerHTML = section.contentHtml;
            } else {
                parseEntries(section.content).forEach((entry) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'resume-entry';
                    if (entry.type === 'paragraph') {
                        const paragraph = document.createElement('div');
                        paragraph.className = 'resume-entry-paragraph resume-editable';
                        paragraph.contentEditable = 'true';
                        paragraph.dataset.role = 'entry-paragraph';
                        paragraph.textContent = entry.paragraph || '';
                        if (justify) {
                            paragraph.style.textAlign = 'justify';
                            paragraph.style.textJustify = 'inter-ideograph';
                        }
                        wrapper.appendChild(paragraph);
                        container.appendChild(wrapper);
                        return;
                    }

                    wrapper.style.fontSize = `${bodySize}px`;
                    wrapper.style.lineHeight = lineHeight;

                    const header = document.createElement('div');
                    header.className = 'resume-entry-header';

                    const left = document.createElement('div');
                    left.className = 'flex-1 min-w-0';
                    left.innerHTML = `
                        <div class="resume-editable" contenteditable="true" data-role="entry-title">${entry.title || ''}</div>
                        ${entry.subtitle ? `<div class="resume-entry-sub resume-editable" contenteditable="true" data-role="entry-subtitle">${entry.subtitle}</div>` : ''}
                    `;

                    const date = document.createElement('div');
                    date.className = 'resume-entry-date resume-editable';
                    date.contentEditable = 'true';
                    date.dataset.role = 'entry-date';
                    date.textContent = entry.date || '';

                    header.appendChild(left);
                    header.appendChild(date);
                    wrapper.appendChild(header);

                    if (entry.bullets.length) {
                        const ul = document.createElement('ul');
                        entry.bullets.forEach((bullet) => {
                            const li = document.createElement('li');
                            li.textContent = bullet;
                            li.classList.add('resume-editable');
                            li.contentEditable = 'true';
                            li.dataset.role = 'entry-bullet';
                            if (justify) li.classList.add('justify');
                            ul.appendChild(li);
                        });
                        wrapper.appendChild(ul);
                    }

                    container.appendChild(wrapper);
                });
            }

            normalizeSectionBodyTypography(container, { bodySize, lineHeight, justify, kind: 'entries' });

            return container;
        }

        function createSkillsNode(section, bodySize, lineHeight, justify) {
            const container = document.createElement('div');
            container.dataset.role = 'section-body';
            container.dataset.sectionKind = 'skills';

            if (section.contentHtml) {
                container.innerHTML = section.contentHtml;
            } else {
                parseSkills(section.content).forEach((entry) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'resume-entry';
                    wrapper.innerHTML = `
                        <div>
                            <strong class="resume-editable" contenteditable="true" data-role="skill-label">${entry.label}</strong>:
                            <span class="resume-editable" contenteditable="true" data-role="skill-content">${entry.content}</span>
                        </div>
                    `;
                    container.appendChild(wrapper);
                });
            }

            normalizeSectionBodyTypography(container, { bodySize, lineHeight, justify, kind: 'skills' });

            return container;
        }

        function createEducationNode(section, bodySize, lineHeight) {
            const table = document.createElement('table');
            table.className = 'resume-edu-table';
            table.dataset.role = 'section-body';
            table.dataset.sectionKind = 'education';
            table.innerHTML = `
                <colgroup>
                    <col style="width:17%">
                    <col style="width:16%">
                    <col style="width:17%">
                    <col style="width:8%">
                    <col style="width:17%">
                    <col style="width:25%">
                </colgroup>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            if (section.contentHtml) {
                tbody.innerHTML = section.contentHtml;
            } else {
                parseEducation(section.content).forEach((row, rowIndex) => {
                    const tr = document.createElement('tr');
                    const isWideRow = row.slice(1).every((cell) => !cell);

                    if (isWideRow) {
                        const td = document.createElement('td');
                        td.textContent = row[0];
                        td.colSpan = 6;
                        td.classList.add('resume-editable', 'edu-wide');
                        td.contentEditable = 'true';
                        td.dataset.rowIndex = String(rowIndex);
                        td.dataset.colIndex = '0';
                        td.style.fontWeight = '700';
                        tr.appendChild(td);
                    } else {
                        row.forEach((cell, index) => {
                            const td = document.createElement('td');
                            td.textContent = cell;
                            td.classList.add('resume-editable', 'edu-compact');
                            td.contentEditable = 'true';
                            td.dataset.rowIndex = String(rowIndex);
                            td.dataset.colIndex = String(index);
                            if (index === 0) td.style.fontWeight = '700';
                            tr.appendChild(td);
                        });
                    }

                    tbody.appendChild(tr);
                });
            }

            table.querySelectorAll('td').forEach((td) => {
                td.style.fontSize = `${bodySize}px`;
                td.style.lineHeight = lineHeight;
                if (td.dataset.colIndex === '0') td.style.fontWeight = '700';
            });

            return table;
        }

        function renderResumeSections() {
            const justify = els.justifyToggle.checked;

            els.resumeSections.innerHTML = '';
            sectionsState.forEach((section) => {
                const bodySize = coerceNumber(section.bodySize, DEFAULT_SECTION_BODY_SIZE);
                const lineHeight = coerceNumber(section.lineHeight, DEFAULT_SECTION_BODY_LINE_HEIGHT);
                const titleSize = coerceNumber(section.titleSize, DEFAULT_SECTION_TITLE_SIZE);
                const titleLineHeight = coerceNumber(section.titleLineHeight, DEFAULT_SECTION_TITLE_LINE_HEIGHT);
                const sectionNode = document.createElement('section');
                sectionNode.className = 'resume-section';
                sectionNode.dataset.sectionId = section.id;

                const title = document.createElement('div');
                title.className = 'resume-section-title resume-editable';
                title.contentEditable = 'true';
                title.dataset.role = 'section-title';
                title.innerHTML = section.titleHtml || section.title || '未命名部分';
                title.style.fontSize = `${titleSize}px`;
                title.style.lineHeight = titleLineHeight;

                const rule = document.createElement('div');
                rule.className = 'resume-rule';

                sectionNode.appendChild(title);
                sectionNode.appendChild(rule);

                if (section.kind === 'education') {
                    sectionNode.appendChild(createEducationNode(section, bodySize, lineHeight));
                } else if (section.kind === 'skills') {
                    sectionNode.appendChild(createSkillsNode(section, bodySize, lineHeight, justify));
                } else {
                    sectionNode.appendChild(createEntriesNode(section, bodySize, lineHeight, justify));
                }

                els.resumeSections.appendChild(sectionNode);
            });
        }

            sectionsState.forEach((section) => {

                titleInput.value = section.title;

                contentInput.value = section.content;
                titleSizeInput.value = String(coerceNumber(section.titleSize, DEFAULT_SECTION_TITLE_SIZE));
                titleLineHeightInput.value = String(coerceNumber(section.titleLineHeight, DEFAULT_SECTION_TITLE_LINE_HEIGHT));
                bodySizeInput.value = String(coerceNumber(section.bodySize, DEFAULT_SECTION_BODY_SIZE));
                lineHeightInput.value = String(coerceNumber(section.lineHeight, DEFAULT_SECTION_BODY_LINE_HEIGHT));

                titleInput.addEventListener('input', () => {
                    section.title = titleInput.value;

                    section.contentHtml = '';
                    renderSectionPanels();
                    renderSectionTabs();
                    renderResumePreview();
                    setActiveEditorPanel(`section:${section.id}`);
                    scheduleAutosave();
                });

                contentInput.addEventListener('input', () => {
                    section.content = contentInput.value;
                    if (section.kind === 'entries' && section.contentHtml && isLegacyEntryTextSource(section.content)) {
                        section.contentHtml = updateLegacyEntriesHtml(section.contentHtml, section.content);
                    } else {
                        section.contentHtml = '';
                    }
                    renderResumePreview();
                    scheduleAutosave();
                });

                [
                    [titleSizeInput, 'titleSize'],
                    [titleLineHeightInput, 'titleLineHeight'],
                    [bodySizeInput, 'bodySize'],
                    [lineHeightInput, 'lineHeight']
                ].forEach(([input, key]) => {
                    const updateSectionTypography = () => {
                        section[key] = coerceNumber(input.value, section[key]);
                        renderResumePreview();
                        scheduleAutosave();
                    };
                    input.addEventListener('input', updateSectionTypography);
                    input.addEventListener('change', updateSectionTypography);
                });

                deleteBtn.addEventListener('click', () => {
                    if (!window.confirm(`确认删除“${section.title || '未命名部分'}”？`)) {
                        return;
                    }
                    sectionsState = sectionsState.filter((item) => item.id !== section.id);
                    if (!sectionsState.length) {
                        sectionsState.push(createNewSection('entries', '新部分'));
                    }
                    if (activeEditorPanel === `section:${section.id}`) {
                        activeEditorPanel = `section:${sectionsState[0].id}`;
                    }
                    renderUISections();
                    renderResumePreview();
                    scheduleAutosave();
                });
            });
        }

        function renderUISections() {
            renderSectionTabs();
            renderSectionPanels();
            setActiveEditorPanel(activeEditorPanel);
        }

        function renderTypography() {
            const nameSize = Number(els.nameSize.value);
            const metaSize = Number(els.metaSize.value);
            const sectionGap = Number(els.sectionGap.value);
            const topSectionGap = Number(els.topSectionGap.value);

            els.previewName.style.fontSize = `${nameSize}px`;
            [els.previewContact1, els.previewContact2, els.previewSummary].forEach((el) => {
                el.style.fontSize = `${metaSize}px`;
                el.style.lineHeight = 1.2;
            });
            const sectionNodes = Array.from(els.resumeSections.querySelectorAll('.resume-section'));
            sectionNodes.forEach((sectionNode, index) => {
                sectionNode.style.marginTop = `${index === 0 ? topSectionGap : sectionGap}px`;
            });
        }

        function renderResumePreview() {
            setEditableContent(els.previewName, els.nameInput.value.trim(), 'name');
            setEditableContent(els.previewContact1, els.contactLine1Input.value.trim(), 'contactLine1');
            setEditableContent(els.previewContact2, els.contactLine2Input.value.trim(), 'contactLine2');
            setEditableContent(els.previewSummary, els.summaryInput.value.trim(), 'summary');
            renderPhoto();
            renderResumeSections();
            renderTypography();
            bindPreviewEditing();
        }

        function fullRender() {
            renderUISections();
            renderResumePreview();
        }

        function syncTopFieldFromPreview(event, shouldAutosave = true) {
            const inputId = event.currentTarget.dataset.bindInput;
            if (!inputId || !els[inputId]) return;
            els[inputId].value = event.currentTarget.innerText.replace(/\n+/g, ' ').trim();
            const richKey = event.currentTarget.dataset.richKey;
            if (richKey) {
                topRichState[richKey] = event.currentTarget.innerHTML;
            }
            if (shouldAutosave) scheduleAutosave();
        }

        function syncSectionTitleFromPreview(sectionId, shouldAutosave = true) {
            const section = getSectionById(sectionId);
            const titleNode = getSectionTitleNode(sectionId);
            if (!section || !titleNode) return;
            section.title = titleNode.innerText.replace(/\n+/g, ' ').trim();
            section.titleHtml = titleNode.innerHTML;
            renderSectionTabs();
            setActiveEditorPanel(activeEditorPanel);
            const titleInput = getSectionPanelTitleInput(sectionId);
            if (titleInput) titleInput.value = section.title;
            if (shouldAutosave) scheduleAutosave();
        }

        function syncEducationSectionFromPreview(sectionId, shouldAutosave = true) {
            const section = getSectionById(sectionId);
            const bodyNode = getSectionBodyNode(sectionId);
            if (!section || !bodyNode) return;
            const rows = Array.from(bodyNode.querySelectorAll('tr')).map((tr) => {
                const tds = Array.from(tr.querySelectorAll('td'));
                if (tds.length === 1 && Number(tds[0].colSpan) === 6) {
                    return `${tds[0].innerText.replace(/\n+/g, ' ').trim()} |  |  |  |  | `;
                }
                const cells = tds.map((td) => td.innerText.replace(/\n+/g, ' ').trim());
                while (cells.length < 6) cells.push('');
                return cells.slice(0, 6).join(' | ');
            });
            section.content = rows.join('\n');
            section.contentHtml = bodyNode.querySelector('tbody')?.innerHTML || '';
            const panelInput = getSectionPanelInput(sectionId);
            if (panelInput) panelInput.value = section.content;
            if (shouldAutosave) scheduleAutosave();
        }

        function syncEntriesSectionFromPreview(sectionId, shouldAutosave = true) {
            const section = getSectionById(sectionId);
            const bodyNode = getSectionBodyNode(sectionId);
            if (!section || !bodyNode) return;
            const blocks = Array.from(bodyNode.querySelectorAll('.resume-entry')).map((entry) => {
                const paragraph = entry.querySelector('[data-role="entry-paragraph"]');
                if (paragraph) {
                    return paragraph.innerText.replace(/\n+/g, ' ').trim();
                }
                const title = entry.querySelector('[data-role="entry-title"]')?.innerText.replace(/\n+/g, ' ').trim() || '';
                const subtitle = entry.querySelector('[data-role="entry-subtitle"]')?.innerText.replace(/\n+/g, ' ').trim() || '';
                const date = entry.querySelector('[data-role="entry-date"]')?.innerText.replace(/\n+/g, ' ').trim() || '';
                const bullets = Array.from(entry.querySelectorAll('[data-role="entry-bullet"]'))
                    .map((li) => li.innerText.replace(/\n+/g, ' ').trim())
                    .filter(Boolean);
                const lines = [[title, subtitle, date].join(' | ').trim(), ...bullets].filter(Boolean);
                return lines.join('\n');
            }).filter(Boolean);
            section.content = blocks.join('\n\n');
            section.contentHtml = bodyNode.innerHTML;
            const panelInput = getSectionPanelInput(sectionId);
            if (panelInput) panelInput.value = section.content;
            if (shouldAutosave) scheduleAutosave();
        }

        function syncSkillsSectionFromPreview(sectionId, shouldAutosave = true) {
            const section = getSectionById(sectionId);
            const bodyNode = getSectionBodyNode(sectionId);
            if (!section || !bodyNode) return;
            const lines = Array.from(bodyNode.querySelectorAll('.resume-entry')).map((entry) => {
                const label = entry.querySelector('[data-role="skill-label"]')?.innerText.replace(/\n+/g, ' ').trim() || '';
                const content = entry.querySelector('[data-role="skill-content"]')?.innerText.replace(/\n+/g, ' ').trim() || '';
                return [label, content].join(' | ').trim();
            }).filter(Boolean);
            section.content = lines.join('\n');
            section.contentHtml = bodyNode.innerHTML;
            const panelInput = getSectionPanelInput(sectionId);
            if (panelInput) panelInput.value = section.content;
            if (shouldAutosave) scheduleAutosave();
        }

        function syncAllPreviewState() {
            [els.previewName, els.previewContact1, els.previewContact2, els.previewSummary].forEach((el) => {
                syncTopFieldFromPreview({ currentTarget: el }, false);
            });
            sectionsState.forEach((section) => {
                syncSectionTitleFromPreview(section.id, false);
                if (section.kind === 'education') {
                    syncEducationSectionFromPreview(section.id, false);
                } else if (section.kind === 'skills') {
                    syncSkillsSectionFromPreview(section.id, false);
                } else {
                    syncEntriesSectionFromPreview(section.id, false);
                }
            });
            scheduleAutosave();
        }

        function bindPreviewEditing() {
            [els.previewName, els.previewContact1, els.previewContact2, els.previewSummary].forEach((el) => {
                el.oninput = (event) => syncTopFieldFromPreview(event, true);
                el.onblur = (event) => syncTopFieldFromPreview(event, true);
            });

            sectionsState.forEach((section) => {
                const titleNode = getSectionTitleNode(section.id);
                if (titleNode) {
                    titleNode.oninput = () => syncSectionTitleFromPreview(section.id, true);
                    titleNode.onblur = () => syncSectionTitleFromPreview(section.id, true);
                }

                const bodyNode = getSectionBodyNode(section.id);
                if (!bodyNode) return;

                if (section.kind === 'education') {
                    bodyNode.querySelectorAll('td').forEach((td) => {
                        td.oninput = () => syncEducationSectionFromPreview(section.id, true);
                        td.onblur = () => syncEducationSectionFromPreview(section.id, true);
                    });
                } else if (section.kind === 'skills') {
                    bodyNode.querySelectorAll('.resume-editable').forEach((node) => {
                        node.oninput = () => syncSkillsSectionFromPreview(section.id, true);
                        node.onblur = () => syncSkillsSectionFromPreview(section.id, true);
                    });
                } else {
                    bodyNode.querySelectorAll('.resume-editable').forEach((node) => {
                        node.oninput = () => syncEntriesSectionFromPreview(section.id, true);
                        node.onblur = () => syncEntriesSectionFromPreview(section.id, true);
                    });
                }
            });
        }

        function selectionInsideResume() {
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return false;
            const node = selection.anchorNode;
            return !!node && els.resumePaper.contains(node);
        }

        function applyFormat(command) {
            if (!selectionInsideResume()) return;
            document.execCommand(command, false);
            syncAllPreviewState();
        }

        function buildPrintClone() {
            const clone = els.resumePaper.cloneNode(true);
            clone.querySelectorAll('[contenteditable]').forEach((node) => {
                node.removeAttribute('contenteditable');
            });
            clone.querySelectorAll('[id]').forEach((node) => {
                node.removeAttribute('id');
            });
            clone.querySelectorAll('[data-bind-input], [data-rich-key], [data-role], [data-section-id], [data-section-kind], [data-row-index], [data-col-index]').forEach((node) => {
                node.removeAttribute('data-bind-input');
                node.removeAttribute('data-rich-key');
                node.removeAttribute('data-role');
                node.removeAttribute('data-section-id');
                node.removeAttribute('data-section-kind');
                node.removeAttribute('data-row-index');
                node.removeAttribute('data-col-index');
            });
            return clone;
        }

        function cleanupPrintMode() {
            document.body.classList.remove('print-mode');
            els.printCloneHost.innerHTML = '';
        }

        function printResume() {
            els.printCloneHost.innerHTML = '';
            els.printCloneHost.appendChild(buildPrintClone());
            document.body.classList.add('print-mode');

            window.setTimeout(() => {
                window.print();
            }, 80);
        }

        function addNewSection() {
            const title = window.prompt('请输入新部分名称', '新部分');
            const normalizedTitle = (title || '').trim();
            if (!normalizedTitle) {
                setStorageStatus('已取消新增部分。');
                return;
            }

            const kindPrompt = (window.prompt('请输入新部分类型：entries（经历列表） / education（教育表格） / skills（技能列表）', 'entries') || '').trim().toLowerCase();
            const kind = ['entries', 'education', 'skills'].includes(kindPrompt) ? kindPrompt : 'entries';
            const section = createNewSection(kind, normalizedTitle);
            sectionsState.push(section);
            activeEditorPanel = `section:${section.id}`;
            renderUISections();
            renderResumePreview();
            scheduleAutosave();
        }

        [
            els.nameSize,
            els.metaSize,
            els.sectionGap,
            els.topSectionGap,
            els.justifyToggle
        ].forEach((el) => {
            const eventName = el.type === 'checkbox' ? 'change' : 'input';
            el.addEventListener(eventName, () => {
                renderResumePreview();
                scheduleAutosave();
            });
            if (eventName !== 'change') {
                el.addEventListener('change', () => {
                    renderResumePreview();
                    scheduleAutosave();
                });
            }
        });

        [
            [els.nameInput, 'name'],
            [els.contactLine1Input, 'contactLine1'],
            [els.contactLine2Input, 'contactLine2'],
            [els.summaryInput, 'summary']
        ].forEach(([el, richKey]) => {
            el.addEventListener('input', () => {
                delete topRichState[richKey];
                renderResumePreview();
                scheduleAutosave();
            });
            el.addEventListener('change', () => {
                delete topRichState[richKey];
                renderResumePreview();
                scheduleAutosave();
            });
        });

        els.photoInput.addEventListener('click', () => {
            els.photoInput.value = '';
        });

        els.photoInput.addEventListener('change', async (event) => {
            const file = event.target.files?.[0];
            if (!file) {
                photoDataUrl = '';
                renderResumePreview();
                return;
            }
            try {
                photoDataUrl = await optimizePhotoFile(file);
                renderResumePreview();
                scheduleAutosave();
                setStorageStatus('证件照已更新并压缩保存。');
            } catch (error) {
                setStorageStatus('证件照处理失败，请重新选择图片。');
            }
        });

        els.addSectionBtn.addEventListener('click', addNewSection);
        els.printBtn.addEventListener('click', printResume);
        els.topCollapseBtn.addEventListener('click', () => {
            const collapsed = !els.topControlsBody.hidden;
            setTopPanelCollapsed(collapsed);
        });
        window.addEventListener('afterprint', cleanupPrintMode);

        els.saveBtn.addEventListener('click', () => saveDraft({ silent: false }));
        els.resetBtn.addEventListener('click', () => {
            if (!window.confirm('确认恢复默认内容吗？这会覆盖当前草稿，但不会删除已保存预设。')) {
                setStorageStatus('已取消恢复默认。');
                return;
            }
            applyDefaults();
            saveDraft({ silent: true });
            setStorageStatus('已恢复默认内容，并覆盖当前草稿。');
        });
        els.savePresetBtn.addEventListener('click', saveCurrentAsPreset);
        els.deletePresetBtn.addEventListener('click', deleteSelectedPreset);
        els.exportJsonBtn.addEventListener('click', exportStorageJson);
        els.importJsonBtn.addEventListener('click', () => els.importJsonInput.click());
        els.importJsonInput.addEventListener('change', importStorageJson);
        els.presetSelect.addEventListener('change', () => {
            if (els.presetSelect.value) {
                loadSelectedPreset();
            } else {
                storageData.activePreset = '';
                persistStorage();
                refreshPresetSelect();
                setStorageStatus('已取消当前预设选择。');
            }
        });

        document.querySelector('[data-panel-target="profile"]').addEventListener('click', () => setActiveEditorPanel('profile'));

        window.addEventListener('keydown', (event) => {
            const withMeta = event.metaKey || event.ctrlKey;
            if (!withMeta) return;

            const key = event.key.toLowerCase();
            if (key === 's' && event.shiftKey) {
                event.preventDefault();
                saveCurrentAsPreset();
                return;
            }
            if (key === 's') {
                event.preventDefault();
                saveDraft({ silent: false });
                return;
            }
            if (key === 'p') {
                event.preventDefault();
                printResume();
                return;
            }
            if (key === 'o' && event.shiftKey) {
                event.preventDefault();
                els.importJsonInput.click();
            }
        });

        window.addEventListener('beforeunload', () => {
            if (autosaveTimer) {
                window.clearTimeout(autosaveTimer);
                saveDraft({ silent: true });
            }
        });

        document.querySelectorAll('.format-btn').forEach((button) => {
            button.addEventListener('click', () => applyFormat(button.dataset.command));
        });

        restoreTopPanelState();

        if (!loadInitialState()) {
            applyDefaults();
        } else {
            restoreActiveEditorPanel();
        }
    </script>
</body>
</html>
